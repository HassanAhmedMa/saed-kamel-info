<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <meta
    name="description"
    content="A polished digital business card with quick contact actions and reusable profile-based routing."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="ambient ambient-left" aria-hidden="true"></div>
    <div class="ambient ambient-right" aria-hidden="true"></div>

    <main class="card" id="profileCard">
      <div class="card-glow" aria-hidden="true"></div>

      <section class="hero">
        <div class="avatar-frame">
          <img
            id="profileImage"
            class="avatar-image"
            src="./assets/profiles/saed-kamel.png"
            alt="Profile photo"
          >
        </div>

        <p class="eyebrow" id="profileCompany">Enpal Egypt LLC</p>
        <h1 id="profileName">Saed Kamel</h1>
        <p class="role" id="profileRole">Property &amp; Facility Manager</p>
      </section>

      <section class="actions" id="actionList" aria-label="Contact actions"></section>

      <footer class="card-footer">
        <p id="profileTagline">Scan. Connect. Save.</p>
      </footer>
    </main>
  </div>

  <script src="./profiles.js"></script>
  <script src="./script.js"></script>
</body>
</html>
